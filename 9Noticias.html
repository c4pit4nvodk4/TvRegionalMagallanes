<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="LOGOS/ICON.png" rel="icon">
  <title>TV Regional Magallanes - Multiview Noticias</title>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg-1: #02060d;
      --bg-2: #07111f;
      --bg-3: #0b1d33;
      --line: rgba(255, 255, 255, 0.06);
      --glow: rgba(0, 153, 255, 0.18);
      --border: rgba(255, 255, 255, 0.14);
      --shadow: rgba(0, 0, 0, 0.45);
      --active: rgba(0, 170, 255, 0.55);
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: Arial, sans-serif;
      overflow-x: hidden;
      background:
        radial-gradient(circle at top center, rgba(0, 153, 255, 0.18), transparent 32%),
        radial-gradient(circle at bottom left, rgba(0, 70, 140, 0.12), transparent 28%),
        linear-gradient(180deg, var(--bg-3) 0%, var(--bg-2) 40%, var(--bg-1) 100%);
      color: white;
    }

    body {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 10px 10px 24px;
      animation: fadeInBody 0.8s ease;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(var(--line) 1px, transparent 1px),
        linear-gradient(90deg, var(--line) 1px, transparent 1px);
      background-size: 36px 36px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,0.55), transparent 85%);
      z-index: 0;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at center, transparent 55%, rgba(0, 0, 0, 0.28) 100%);
      z-index: 0;
    }

    .main-image,
    .grid,
    .donaciones,
    .home-button {
      position: relative;
      z-index: 1;
    }

    .main-image {
      display: block;
      width: 100%;
      max-width: 800px;
      height: auto;
      margin: 0 auto 8px auto;
      border: 1px solid var(--border);
      box-shadow:
        0 10px 30px var(--shadow),
        0 0 30px rgba(0, 153, 255, 0.08);
      animation: fadeDown 0.8s ease;
    }

    .grid {
      width: min(1200px, 100%);
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 3px;
      padding: 3px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      box-shadow:
        0 14px 40px rgba(0, 0, 0, 0.35),
        0 0 24px rgba(0, 153, 255, 0.06);
      animation: fadeUp 0.9s ease;
      backdrop-filter: blur(4px);
    }

    video {
      display: block;
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #000;
      border: 1px solid rgba(255, 255, 255, 0.10);
      cursor: pointer;
      object-fit: cover;
      transition:
        transform 0.22s ease,
        box-shadow 0.22s ease,
        filter 0.22s ease,
        border-color 0.22s ease;
    }

    video:hover {
      transform: scale(1.02);
      filter: brightness(1.06) contrast(1.04);
      border-color: rgba(0, 170, 255, 0.35);
      box-shadow:
        0 0 0 1px rgba(0, 170, 255, 0.10),
        0 0 14px var(--glow);
      z-index: 2;
      position: relative;
    }

    video.active-audio {
      border-color: var(--active);
      box-shadow:
        0 0 0 1px rgba(0, 170, 255, 0.20),
        0 0 18px rgba(0, 170, 255, 0.28);
      position: relative;
      z-index: 3;
    }

    .home-button {
      position: fixed;
      bottom: 16px;
      right: 16px;
      width: 54px;
      height: 54px;
      background: linear-gradient(135deg, rgba(0, 122, 255, 0.95), rgba(0, 170, 255, 0.95));
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow:
        0 8px 20px rgba(0, 0, 0, 0.35),
        0 0 18px rgba(0, 153, 255, 0.18);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .home-button:hover {
      transform: scale(1.08);
      box-shadow:
        0 12px 28px rgba(0, 0, 0, 0.4),
        0 0 22px rgba(0, 153, 255, 0.28);
    }

    .home-button img {
      width: 26px;
      height: 26px;
      filter: invert(1);
    }

    .donaciones {
      display: block;
      margin: 14px 0 18px;
      font-size: 15px;
      color: #7fd0ff;
      text-decoration: none;
      transition: opacity 0.2s ease, transform 0.2s ease, color 0.2s ease;
      text-shadow: 0 0 8px rgba(0, 153, 255, 0.12);
    }

    .donaciones:hover {
      opacity: 0.95;
      transform: translateY(-1px);
      color: #a8e2ff;
    }

    @media (max-width: 900px) {
      .grid {
        grid-template-columns: repeat(3, 1fr);
        gap: 2px;
        padding: 2px;
      }

      video {
        aspect-ratio: 16 / 9;
      }
    }

    @media (max-width: 600px) {
      body {
        padding: 6px 6px 20px;
      }

      .main-image {
        margin-bottom: 5px;
      }

      .grid {
        width: 100%;
        grid-template-columns: repeat(3, 1fr);
        gap: 1px;
        padding: 1px;
      }

      video {
        aspect-ratio: 16 / 9;
        border-width: 1px;
      }

      .donaciones {
        margin: 10px 0 14px;
        font-size: 14px;
      }
    }

    @keyframes fadeInBody {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes fadeDown {
      from {
        opacity: 0;
        transform: translateY(-14px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>

  <img src="MENU/PORTADA.png" alt="Portada" class="main-image">

  <div class="grid">
    <video id="video0" muted autoplay playsinline controls></video>
    <video id="video1" muted autoplay playsinline controls></video>
    <video id="video2" muted autoplay playsinline controls></video>
    <video id="video3" muted autoplay playsinline controls></video>
    <video id="video4" muted autoplay playsinline controls></video>
    <video id="video5" muted autoplay playsinline controls></video>
    <video id="video6" muted autoplay playsinline controls></video>
    <video id="video7" muted autoplay playsinline controls></video>
    <video id="video8" muted autoplay playsinline controls></video>
  </div>

  <a href="https://link.mercadopago.cl/tvregionalmagallanes" target="_blank" class="donaciones">
    Donaciones · Ayúdanos a crecer
  </a>

  <a href="https://c4pit4nvodk4.github.io/TvRegionalMagallanes/" class="home-button" title="Ir al inicio">
    <img src="https://cdn-icons-png.flaticon.com/512/25/25694.png" alt="Inicio">
  </a>

  <script>
    const streams = [
      "https://redirector.rudo.video/hls-video/339f69c6122f6d8f4574732c235f09b7683e31a5/pinguinotv/pinguinotv.smil/playlist.m3u8",
      "https://live20.bozztv.com/akamaissh101/ssh101/radiomagallanes/playlist.m3u8",
      "https://polartv.webredirect.org/memfs/319ac83c-e602-4e91-8104-2b5501380b5e.m3u8",
      "https://unlimited1-cl-isp.dps.live/itv/itv.smil/playlist.m3u8?PlaylistM3UCL",
      "https://tls-cl.cdnz.cl/radiosoberania/live/playlist.m3u8?PlaylistM3UCL",
      "https://ibanez.servercl.com/hls/live.m3u8",
      "https://tls-cl.cdnz.cl/umag1/ngrp:live_all/playlist.m3u8",
      "https://redirector.rudo.video/hls-video/ey6283je82983je9823je8jowowiekldk9838274/surtv/surtv.smil/playlist.m3u8?did=",
      "https://video3.servidordevideo.net:3585/live/upbsfzhdlive.m3u8"
    ];

    const videos = [];
    let activeVideo = null;

    function setActiveAudio(selectedVideo) {
      videos.forEach((video) => {
        const isSelected = video === selectedVideo;
        video.muted = !isSelected;
        video.volume = isSelected ? 1 : 0;
        video.classList.toggle("active-audio", isSelected);
      });

      activeVideo = selectedVideo;
      selectedVideo.play().catch(() => {});
    }

    streams.forEach((url, index) => {
      const video = document.getElementById(`video${index}`);
      video.muted = true;
      video.volume = 0;
      videos.push(video);

      if (Hls.isSupported()) {
        const hls = new Hls({
          lowLatencyMode: true,
          enableWorker: true
        });

        hls.loadSource(url);
        hls.attachMedia(video);

        hls.on(Hls.Events.MANIFEST_PARSED, () => {
          video.play().catch(() => {});
        });

        hls.on(Hls.Events.ERROR, (event, data) => {
          console.error(`Error en video ${index}:`, data);
        });
      } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
        video.src = url;
        video.addEventListener("loadedmetadata", () => {
          video.play().catch(() => {});
        });
      }

      video.addEventListener("click", () => {
        if (activeVideo === video) {
          video.muted = false;
          video.volume = 1;
          video.classList.add("active-audio");
          video.play().catch(() => {});
          return;
        }

        setActiveAudio(video);
      });
    });
  </script>

  <script src="https://contador.websiteout.com/js/7/0/0/0"></script>
</body>
</html>
